services:
  - type: web
    name: expense-tracker-backend
    env: docker
    plan: free
    buildCommand: docker build -t expense-tracker-backend .
    startCommand: java -jar target/expense-tracker-backend-*.jar
    envVars:
      - key: MONGODB_URI
        value: ${MONGODB_URI}
      - key: GOOGLE_CLIENT_ID
        value: ${GOOGLE_CLIENT_ID}
      - key: GOOGLE_CLIENT_SECRET
        value: ${GOOGLE_CLIENT_SECRET}
      - key: GOOGLE_REDIRECT_URI
        value: ${GOOGLE_REDIRECT_URI}
      - key: SPRING_PROFILES_ACTIVE
        value: production
